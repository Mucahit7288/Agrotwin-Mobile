# Veritabanı Dosyası (Dosya adının doğruluğundan emin ol)
spring.datasource.url=jdbc:sqlite:agrotwin_data.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Hibernate 7 Yapılandırması
# Dialect satırı silindi, Hibernate JDBC URL'sinden otomatik tanıyacaktır.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# SQLite için Hibernate uyumluluk ayarları
spring.jpa.properties.hibernate.format_sql=true
